name: Node.js Deployment with Global pnpm

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Uses your server's globally installed pnpm 
      # --frozen-lockfile ensures production consistency
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Application
        run: pnpm --if-present run build

      - name: Restart Server Process
        run: |
          # Define PM2_HOME if your PM2 processes are managed by a specific system user (e.g., root)
          # Modify or remove this export statement as needed for your specific runner configuration
          export PM2_HOME=/home/root/.pm2
          
          # Restart the existing PM2 process, or start it if it doesn't exist
          pm2 restart node-pm2-deploy-app --update-env || pm2 start dist/main.js --name "node-pm2-deploy-app" --update-env

